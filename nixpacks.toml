[variables]
PHP_VERSION = "8.2"

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction"
]

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force && php artisan storage:link --force 2>/dev/null; php -S 0.0.0.0:$PORT -t public public/index.php"
